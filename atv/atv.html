<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código com Empatia</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    nav a {
        margin-right: 15px;
    }

    a:focus,
    button:focus {
        outline: 3px solid blue;
    }
</style>
</head>
<body>

    <!-- HTML Semântico -->
    <header>
        <h1>Código com Empatia</h1>
    </header>

    <nav>
        <a href="#conteudo">Conteúdo</a>
        <a href="#contato">Contato</a>
    </nav>

    <main id="conteudo">
        <!-- Hierarquia de Informação -->
        <h2>HTML Semântico</h2>
        <p>Utilize tags como header, nav, main e article.</p>

        <h2>Gestão de Foco</h2>
        <p>A navegação por teclado deve ser clara e visível.</p>

        <!-- Gestão de Foco -->
        <button>Saiba Mais</button>
    </main>

    <footer id="contato">
        <h3>Contato</h3>
        <p>contato@exemplo.com</p>
    </footer>

</body>
</html>
